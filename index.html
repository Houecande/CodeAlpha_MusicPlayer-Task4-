<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Player — Music Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07070A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      padding: 24px;
    }

    /* ─── LAYOUT ─── */
    #mp {
      background: #0E0E12;
      border: 1px solid #1E1E28;
      border-radius: 20px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 280px 1fr;
      width: 100%;
      max-width: 820px;
      min-height: 560px;
      box-shadow: 0 40px 100px rgba(0,0,0,.6);
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      background: #0A0A0E;
      border-right: 1px solid #1A1A24;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sb-head {
      padding: 22px 20px 16px;
      border-bottom: 1px solid #1A1A24;
      flex-shrink: 0;
    }

    .sb-logo {
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #6B6880;
      margin-bottom: 3px;
    }

    .sb-title {
      font-size: 16px;
      font-weight: 600;
      color: #F0EEF8;
      letter-spacing: -.02em;
    }

    .sb-label {
      font-size: 10px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #4A4860;
      padding: 16px 20px 8px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .track-list {
      overflow-y: auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: #2A2A38 transparent;
    }

    .track-list::-webkit-scrollbar { width: 4px; }
    .track-list::-webkit-scrollbar-track { background: transparent; }
    .track-list::-webkit-scrollbar-thumb { background: #2A2A38; border-radius: 4px; }

    .track-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      cursor: pointer;
      transition: background .15s;
      position: relative;
      user-select: none;
    }

    .track-item:hover { background: #141420; }

    .track-item.active { background: #161625; }

    .track-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: #8B7CF8;
      border-radius: 0 2px 2px 0;
    }

    .t-art {
      width: 38px;
      height: 38px;
      border-radius: 7px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .t-art canvas { width: 100%; height: 100%; display: block; }

    .t-info { flex: 1; min-width: 0; }

    .t-name {
      font-size: 12px;
      font-weight: 500;
      color: #D8D6E8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .t-artist {
      font-size: 11px;
      color: #6B6880;
      margin-top: 1px;
    }

    .t-dur {
      font-size: 11px;
      color: #4A4860;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .track-item.active .t-name { color: #C4B8F8; }

    /* ─── MAIN PANEL ─── */
    .main {
      display: flex;
      flex-direction: column;
    }

    /* Now playing */
    .now-playing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 44px 20px;
    }

    .art-big {
      width: 188px;
      height: 188px;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 24px 60px rgba(0,0,0,.55);
      flex-shrink: 0;
    }

    .art-big canvas { width: 100%; height: 100%; display: block; }

    .art-ring {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      border: 1.5px solid rgba(139,124,248,.2);
      pointer-events: none;
    }

    .song-info {
      margin-top: 24px;
      text-align: center;
    }

    .song-name {
      font-size: 20px;
      font-weight: 600;
      color: #F0EEF8;
      letter-spacing: -.02em;
      line-height: 1.2;
    }

    .song-artist {
      font-size: 13px;
      color: #7A7890;
      margin-top: 5px;
    }

    .song-album {
      font-size: 10px;
      color: #4A4860;
      margin-top: 3px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 20px;
    }

    .btn-like {
      background: none;
      border: none;
      color: #4A4860;
      cursor: pointer;
      font-size: 18px;
      padding: 6px;
      border-radius: 50%;
      transition: color .2s, background .2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-like:hover { color: #8B7CF8; background: #1A1A28; }
    .btn-like.liked { color: #8B7CF8; }

    .genre-badge {
      font-size: 10px;
      background: #1E1E30;
      color: #6B6880;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: .07em;
      text-transform: uppercase;
    }

    /* EQ bars */
    .eq-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 16px;
    }

    .eq-bar {
      width: 3px;
      background: #8B7CF8;
      border-radius: 2px;
      opacity: .7;
      transition: height .1s;
    }

    /* ─── PROGRESS ─── */
    .progress-area {
      padding: 0 44px 10px;
    }

    .prog-wrap {
      height: 4px;
      background: #1E1E28;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      margin-bottom: 7px;
    }

    .prog-wrap:hover .prog-fill::after { opacity: 1; }

    .prog-fill {
      height: 100%;
      background: #8B7CF8;
      border-radius: 4px;
      transition: width .1s linear;
      position: relative;
    }

    .prog-fill::after {
      content: '';
      position: absolute;
      right: -5px;
      top: -4px;
      width: 12px;
      height: 12px;
      background: #C4B8F8;
      border-radius: 50%;
      opacity: 0;
      transition: opacity .2s;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #4A4860;
      font-variant-numeric: tabular-nums;
    }

    /* ─── CONTROLS ─── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 4px 44px 12px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #6B6880;
      cursor: pointer;
      font-size: 20px;
      padding: 9px;
      border-radius: 50%;
      transition: color .2s, background .2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn:hover { color: #C4B8F8; background: #1A1A28; }
    .ctrl-btn.active { color: #8B7CF8; }

    .btn-play {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #8B7CF8;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, transform .1s;
      flex-shrink: 0;
    }

    .btn-play:hover { background: #9D90F8; transform: scale(1.06); }
    .btn-play:active { transform: scale(.97); }

    /* ─── VOLUME ─── */
    .vol-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 44px 24px;
    }

    .vol-icon {
      color: #4A4860;
      font-size: 16px;
      display: flex;
      align-items: center;
    }

    .vol-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: #1E1E28;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #8B7CF8;
      cursor: pointer;
    }

    .vol-slider::-moz-range-thumb {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #8B7CF8;
      cursor: pointer;
      border: none;
    }

    .vol-val {
      font-size: 11px;
      color: #4A4860;
      min-width: 28px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      #mp { grid-template-columns: 1fr; grid-template-rows: auto 1fr; min-height: unset; }
      .sidebar { max-height: 200px; border-right: none; border-bottom: 1px solid #1A1A24; }
      .now-playing { padding: 24px 24px 14px; }
      .progress-area { padding: 0 24px 8px; }
      .controls { padding: 4px 24px 10px; }
      .vol-row { padding: 0 24px 18px; }
      .art-big { width: 140px; height: 140px; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .eq-bar, .btn-play, .ctrl-btn { transition: none; }
    }
  </style>
</head>
<body>

<div id="mp" role="application" aria-label="Aether Music Player">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-logo">CodeAlpha</div>
      <div class="sb-title">Aether Player</div>
    </div>
    <div class="sb-label">Playlist — 8 titres</div>
    <div class="track-list" id="track-list" role="list" aria-label="Liste des pistes"></div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- Now Playing -->
    <div class="now-playing">
      <div class="art-big" aria-hidden="true">
        <canvas id="art-main" width="376" height="376"></canvas>
        <div class="art-ring"></div>
      </div>
      <div class="song-info">
        <div class="song-name" id="s-name">Celestial Drift</div>
        <div class="song-artist" id="s-artist">Nova Ether</div>
        <div class="song-album" id="s-album">Signals from the Void · 2024</div>
      </div>
      <div class="meta-row">
        <button class="btn-like" id="btn-like" aria-label="Aimer cette piste">
          <i class="ti ti-heart" aria-hidden="true"></i>
        </button>
        <span class="genre-badge" id="s-genre">Ambient</span>
        <div class="eq-bars" id="eq-bars" aria-hidden="true">
          <div class="eq-bar" style="height:6px"></div>
          <div class="eq-bar" style="height:11px"></div>
          <div class="eq-bar" style="height:8px"></div>
          <div class="eq-bar" style="height:14px"></div>
          <div class="eq-bar" style="height:9px"></div>
        </div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-area">
      <div class="prog-wrap" id="prog-wrap"
           role="slider" aria-label="Progression de la piste"
           aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
           tabindex="0">
        <div class="prog-fill" id="prog-fill" style="width:0%"></div>
      </div>
      <div class="time-row">
        <span id="t-cur" aria-label="Temps écoulé">0:00</span>
        <span id="t-dur" aria-label="Durée totale">3:45</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls" role="group" aria-label="Contrôles de lecture">
      <button class="ctrl-btn" id="btn-shuffle" aria-label="Lecture aléatoire" aria-pressed="false">
        <i class="ti ti-arrows-shuffle" aria-hidden="true"></i>
      </button>
      <button class="ctrl-btn" id="btn-prev" aria-label="Piste précédente">
        <i class="ti ti-player-skip-back" aria-hidden="true"></i>
      </button>
      <button class="btn-play" id="btn-play" aria-label="Lecture / Pause">
        <i class="ti ti-player-play" id="play-icon" aria-hidden="true"></i>
      </button>
      <button class="ctrl-btn" id="btn-next" aria-label="Piste suivante">
        <i class="ti ti-player-skip-forward" aria-hidden="true"></i>
      </button>
      <button class="ctrl-btn" id="btn-repeat" aria-label="Répéter la piste" aria-pressed="false">
        <i class="ti ti-repeat" aria-hidden="true"></i>
      </button>
    </div>

    <!-- Volume -->
    <div class="vol-row">
      <span class="vol-icon" aria-hidden="true"><i class="ti ti-volume"></i></span>
      <input type="range" class="vol-slider" id="vol-slider"
             min="0" max="100" value="75" step="1"
             aria-label="Volume" />
      <span class="vol-val" id="vol-val">75</span>
    </div>

  </div>
</div>

<!-- Tabler Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />

<script>
  /* ── TRACK DATA ──
     Pour utiliser de vrais fichiers audio, ajoute un champ `src` à chaque objet :
     src: 'audio/celestial-drift.mp3'
     Puis dans selectTrack() : audioEl.src = t.src; audioEl.play();
  */
  const TRACKS = [
    { name:"Celestial Drift",   artist:"Nova Ether",    album:"Signals from the Void", year:2024, genre:"Ambient",     dur:225, color:"#8B7CF8", c2:"#3D2B8A" },
    { name:"Neon Tide",         artist:"Solara",         album:"Ultraviolet",           year:2024, genre:"Electronic",  dur:198, color:"#4FC3F7", c2:"#0D47A1" },
    { name:"Velvet Hours",      artist:"Mira Dawn",      album:"Soft Architecture",     year:2023, genre:"Chill",       dur:242, color:"#F48FB1", c2:"#880E4F" },
    { name:"Obsidian Flow",     artist:"Deep Current",   album:"Undertow",              year:2024, genre:"Electronic",  dur:187, color:"#80CBC4", c2:"#00695C" },
    { name:"Golden Static",     artist:"Auric",          album:"Frequency",             year:2023, genre:"Ambient",     dur:263, color:"#FFD54F", c2:"#E65100" },
    { name:"Particle Rain",     artist:"Nova Ether",     album:"Signals from the Void", year:2024, genre:"Chill",       dur:211, color:"#CE93D8", c2:"#4A148C" },
    { name:"Shoreline Echo",    artist:"Mira Dawn",      album:"Soft Architecture",     year:2023, genre:"Ambient",     dur:234, color:"#A5D6A7", c2:"#1B5E20" },
    { name:"Infrared Pulse",    artist:"Deep Current",   album:"Undertow",              year:2024, genre:"Electronic",  dur:176, color:"#EF9A9A", c2:"#B71C1C" },
  ];

  /* ── HELPERS ── */
  function fmtTime(s) {
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  /* ── ARTWORK GENERATOR ──
     Generates a unique abstract artwork per track using Canvas.
     Replace with <img src="covers/track-N.jpg"> if you have real artwork.
  */
  function drawArt(canvas, color, c2, size) {
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0A0A0E';
    ctx.fillRect(0, 0, size, size);
    for (let i = 0; i < 5; i++) {
      const gx = Math.random() * size, gy = Math.random() * size;
      const gr = ctx.createRadialGradient(gx, gy, 0, gx, gy, size * .55);
      gr.addColorStop(0, color + '55');
      gr.addColorStop(1, 'transparent');
      ctx.fillStyle = gr;
      ctx.fillRect(0, 0, size, size);
    }
    const gr2 = ctx.createRadialGradient(size*.4, size*.4, 0, size*.5, size*.5, size*.6);
    gr2.addColorStop(0, c2 + 'AA');
    gr2.addColorStop(.5, color + '44');
    gr2.addColorStop(1, 'transparent');
    ctx.fillStyle = gr2;
    ctx.fillRect(0, 0, size, size);
    ctx.strokeStyle = color + '30';
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      ctx.beginPath();
      ctx.arc(size * .5, size * .5, 18 + i * 20, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  /* ── INIT ARTWORK ── */
  const artMainCanvas = document.getElementById('art-main');
  drawArt(artMainCanvas, TRACKS[0].color, TRACKS[0].c2, 376);

  /* ── BUILD TRACK LIST ── */
  const trackListEl = document.getElementById('track-list');
  const trackEls = [];

  TRACKS.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'track-item' + (i === 0 ? ' active' : '');
    item.dataset.index = i;
    item.setAttribute('role', 'listitem');
    item.setAttribute('tabindex', '0');
    item.setAttribute('aria-label', `${t.name} par ${t.artist}, ${fmtTime(t.dur)}`);

    const artWrap = document.createElement('div');
    artWrap.className = 't-art';
    const cvs = document.createElement('canvas');
    cvs.width = 76; cvs.height = 76;
    drawArt(cvs, t.color, t.c2, 76);
    artWrap.appendChild(cvs);

    item.innerHTML = `
      <div class="t-info">
        <div class="t-name">${t.name}</div>
        <div class="t-artist">${t.artist}</div>
      </div>
      <div class="t-dur">${fmtTime(t.dur)}</div>
    `;
    item.insertBefore(artWrap, item.firstChild);

    item.addEventListener('click', () => selectTrack(i, true));
    item.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectTrack(i, true); }
    });

    trackListEl.appendChild(item);
    trackEls.push(item);
  });

  /* ── STATE ── */
  let curIdx   = 0;
  let playing  = false;
  let curTime  = 0;
  let interval = null;
  let shuffle  = false;
  let repeat   = false;
  const liked  = new Set();

  /* ── ELEMENTS ── */
  const sName    = document.getElementById('s-name');
  const sArtist  = document.getElementById('s-artist');
  const sAlbum   = document.getElementById('s-album');
  const sGenre   = document.getElementById('s-genre');
  const progFill = document.getElementById('prog-fill');
  const progWrap = document.getElementById('prog-wrap');
  const tCur     = document.getElementById('t-cur');
  const tDur     = document.getElementById('t-dur');
  const playIcon = document.getElementById('play-icon');
  const eqBars   = document.getElementById('eq-bars').querySelectorAll('.eq-bar');
  const btnLike  = document.getElementById('btn-like');
  const volVal   = document.getElementById('vol-val');

  /* ── SELECT TRACK ── */
  function selectTrack(i, autoplay) {
    curIdx  = i;
    curTime = 0;
    const t = TRACKS[i];

    sName.textContent   = t.name;
    sArtist.textContent = t.artist;
    sAlbum.textContent  = t.album + ' · ' + t.year;
    sGenre.textContent  = t.genre;
    tDur.textContent    = fmtTime(t.dur);
    tCur.textContent    = '0:00';
    progFill.style.width = '0%';
    progWrap.setAttribute('aria-valuenow', 0);

    drawArt(artMainCanvas, t.color, t.c2, 376);
    trackEls.forEach((el, idx) => el.classList.toggle('active', idx === i));

    /* scroll active item into view */
    trackEls[i].scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    updateLikeBtn();

    if (autoplay) { playing = false; togglePlay(); }
  }

  /* ── PLAY / PAUSE ── */
  function togglePlay() {
    playing = !playing;
    playIcon.className = playing ? 'ti ti-player-pause' : 'ti ti-player-play';
    document.getElementById('btn-play').setAttribute('aria-label', playing ? 'Pause' : 'Lecture');

    if (playing) {
      interval = setInterval(tick, 500);
      animEQ(true);
    } else {
      clearInterval(interval);
      animEQ(false);
    }
  }

  /* ── TICK (simulates playback) ── */
  function tick() {
    curTime += 0.5;
    const t = TRACKS[curIdx];
    if (curTime >= t.dur) {
      if (repeat) { curTime = 0; }
      else { nextTrack(); return; }
    }
    const pct = Math.round((curTime / t.dur) * 100);
    progFill.style.width = pct + '%';
    progWrap.setAttribute('aria-valuenow', pct);
    tCur.textContent = fmtTime(curTime);
  }

  /* ── NAVIGATION ── */
  function nextTrack() {
    let next;
    if (shuffle) { next = Math.floor(Math.random() * TRACKS.length); }
    else { next = (curIdx + 1) % TRACKS.length; }
    selectTrack(next, true);
  }

  function prevTrack() {
    if (curTime > 3) {
      curTime = 0;
      progFill.style.width = '0%';
      tCur.textContent = '0:00';
      return;
    }
    const prev = (curIdx - 1 + TRACKS.length) % TRACKS.length;
    selectTrack(prev, playing);
  }

  /* ── EQ ANIMATION ── */
  let eqAnim;
  const eqHeights = [6, 11, 8, 14, 9];

  function animEQ(on) {
    cancelAnimationFrame(eqAnim);
    if (!on) {
      eqBars.forEach((b, i) => { b.style.height = eqHeights[i] + 'px'; });
      return;
    }
    function frame() {
      eqBars.forEach((b, i) => {
        const h = Math.max(2, Math.min(16, eqHeights[i] + Math.round((Math.random() - .4) * 8)));
        eqHeights[i] = h;
        b.style.height = h + 'px';
      });
      eqAnim = requestAnimationFrame(frame);
    }
    frame();
  }

  /* ── LIKE ── */
  function updateLikeBtn() {
    const isLiked = liked.has(curIdx);
    btnLike.innerHTML = isLiked
      ? '<i class="ti ti-heart-filled" aria-hidden="true"></i>'
      : '<i class="ti ti-heart" aria-hidden="true"></i>';
    btnLike.classList.toggle('liked', isLiked);
    btnLike.setAttribute('aria-label', isLiked ? 'Retirer des favoris' : 'Ajouter aux favoris');
  }

  btnLike.addEventListener('click', () => {
    if (liked.has(curIdx)) { liked.delete(curIdx); }
    else { liked.add(curIdx); }
    updateLikeBtn();
  });

  /* ── PROGRESS SCRUB ── */
  function scrub(e) {
    const rect  = progWrap.getBoundingClientRect();
    const pct   = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    curTime = pct * TRACKS[curIdx].dur;
    progFill.style.width = Math.round(pct * 100) + '%';
    tCur.textContent = fmtTime(curTime);
  }

  progWrap.addEventListener('click', scrub);

  /* ── VOLUME ── */
  document.getElementById('vol-slider').addEventListener('input', function () {
    volVal.textContent = this.value;
  });

  /* ── BUTTONS ── */
  document.getElementById('btn-play').addEventListener('click', togglePlay);
  document.getElementById('btn-next').addEventListener('click', nextTrack);
  document.getElementById('btn-prev').addEventListener('click', prevTrack);

  document.getElementById('btn-shuffle').addEventListener('click', function () {
    shuffle = !shuffle;
    this.classList.toggle('active', shuffle);
    this.setAttribute('aria-pressed', shuffle ? 'true' : 'false');
  });

  document.getElementById('btn-repeat').addEventListener('click', function () {
    repeat = !repeat;
    this.classList.toggle('active', repeat);
    this.setAttribute('aria-pressed', repeat ? 'true' : 'false');
  });

  /* ── KEYBOARD SHORTCUTS ── */
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space')       { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowRight')  { e.preventDefault(); nextTrack(); }
    if (e.code === 'ArrowLeft')   { e.preventDefault(); prevTrack(); }
    if (e.code === 'KeyM')        {
      const vol = document.getElementById('vol-slider');
      vol.value = vol.value > 0 ? 0 : 75;
      volVal.textContent = vol.value;
    }
  });

  /* ── SWIPE (mobile) ── */
  let touchX = 0;
  document.getElementById('mp').addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
  document.getElementById('mp').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 60) { dx < 0 ? nextTrack() : prevTrack(); }
  });
</script>
</body>
</html>
